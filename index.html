<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Navigation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .navbar {
            background: #222;
            color: #fff;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #ff9800;
        }
        .container {
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <div class="container">
        <h2>Welcome!</h2>
        <p>Select a page from the navigation bar above.</p>
    </div>
</body>
</html>
